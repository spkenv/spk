#
# Kafka 2.8.1 (Confluent Platform 6.2.1) for running the spk-storage
# kafka integration tests. This is an alternative to run-kafka-tests.sh
# for those who prefer docker compose / podman-compose.
#
# Bring it up, run the tests, then bring it down:
#
#   docker compose -f docker-compose.yaml up -d
#   SPK_TEST_KAFKA_BROKERS=localhost:9092 \
#     cargo test -p spk-storage --lib messaging::kafka -- --ignored
#   docker compose -f docker-compose.yaml down
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:6.2.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  broker:
    image: confluentinc/cp-kafka:6.2.1 # Kafka 2.8.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
